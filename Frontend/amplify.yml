# AWS Amplify Build Configuration for SocialOS Frontend (Next.js App Router)
# 
# IMPORTANT: Environment variables must be set in the Amplify Console:
# 1. Go to Hosting > Environment variables
# 2. Add all variables listed below
# 3. Make sure to set NEXT_PUBLIC_API_URL to your backend API URL
#
# NOTE: Amplify env vars are only available at BUILD time by default.
# This config creates a .env.production file to make them available at RUNTIME.

version: 1

# Monorepo-friendly configuration: declare Frontend as the app root
applications:
  - appRoot: Frontend
    frontend:
      phases:
        # Pre-build phase: Install dependencies and create runtime env file
        preBuild:
          commands:
            # Print Node.js and npm versions for debugging
            - echo "Node.js version:" && node --version
            - echo "npm version:" && npm --version
            
            # Install dependencies (using legacy-peer-deps for compatibility)
            - npm ci --legacy-peer-deps
            
            # CRITICAL: Create .env.production file for runtime access
            # Amplify env vars are only available at build time, so we write them to a file
            - echo "Creating .env.production for runtime environment variables..."
            - |
              cat << EOF > .env.production
              # Auto-generated by Amplify build - DO NOT COMMIT
              # These variables will be available at runtime
              
              # Backend API Configuration
              NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
              NEXT_PUBLIC_USER_ID=$NEXT_PUBLIC_USER_ID
              
              # NextAuth Configuration (if using authentication)
              NEXTAUTH_URL=$NEXTAUTH_URL
              NEXTAUTH_SECRET=$NEXTAUTH_SECRET
              
              # Google OAuth (if configured)
              GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
              GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
              
              # AWS Bedrock (if using AI features)
              AWS_REGION=$AWS_REGION
              AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
              AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
              
              # Optional: Analytics
              NEXT_PUBLIC_VERCEL_ANALYTICS_ID=$NEXT_PUBLIC_VERCEL_ANALYTICS_ID
              EOF
            
            # Verify the file was created
            - echo "✓ .env.production file created"
            - echo "Checking required environment variables..."
            
            # Verify critical environment variables are set (without exposing values)
            - |
              if [ -z "$NEXT_PUBLIC_API_URL" ]; then
                echo "❌ ERROR: NEXT_PUBLIC_API_URL is not set"
                echo "Please set this in Amplify Console > Environment variables"
                exit 1
              else
                echo "✓ NEXT_PUBLIC_API_URL is set"
              fi
            - |
              if [ -z "$NEXT_PUBLIC_USER_ID" ]; then
                echo "⚠️  WARNING: NEXT_PUBLIC_USER_ID is not set (optional for demo)"
              else
                echo "✓ NEXT_PUBLIC_USER_ID is set"
              fi
        
        # Build phase: Build the Next.js application
        build:
          commands:
            # Set NODE_ENV for production build
            - echo "Building Next.js application..."
            - NODE_ENV=production npm run build
            
            # Copy .env.production to standalone directory for runtime access
            - echo "Copying environment file to build output..."
            - cp .env.production .next/.env.production 2>/dev/null || echo "Copied to .next directory"
            
            # Verify build output
            - echo "Build completed. Checking output..."
            - ls -la .next/
            - echo "✓ Build artifacts ready for deployment"
        
        # Post-build phase: Prepare for deployment
        postBuild:
          commands:
            - echo "Post-build phase completed"
            - echo "Environment variables configured for runtime access"
            - echo "🚀 SocialOS Frontend ready for deployment!"
      
      # Artifacts to deploy - Next.js with App Router
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
          - '.env.production'
      
      # Cache settings for faster builds
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*

    # Custom headers for security and performance
    customHeaders:
      - pattern: '**/*'
        headers:
          - key: 'X-Frame-Options'
            value: 'DENY'
          - key: 'X-Content-Type-Options'
            value: 'nosniff'
          - key: 'X-XSS-Protection'
            value: '1; mode=block'
          - key: 'Referrer-Policy'
            value: 'strict-origin-when-cross-origin'
